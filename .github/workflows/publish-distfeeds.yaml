# saves to   https://w1700k.github.io/builds/distfeeds.list
#   and      https://w1700k.github.io/builds/vermagic.txt

name: publish-distfeeds

on:
  schedule:
    # Run at minute 45 of every 6th hour (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '45 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  extract:
    runs-on: ubuntu-24.04
    steps:
      - name: Install binwalk
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binwalk
      - name: Download and extract
        run: |
          curl https://downloads.openwrt.org/snapshots/targets/airoha/an7581/openwrt-airoha-an7581-airoha_an7581-evb-squashfs-sysupgrade.bin --output sysupgrade.bin
          binwalk -e sysupgrade.bin
      - name: Prepare artifact for GitHub Pages
        run: |
          mkdir -p _site
          cp _sysupgrade.bin.extracted/squashfs-root/etc/apk/repositories.d/distfeeds.list _site/
          sed -n 's/.*6.18.*-*-\([^/]*\).*/\1/p' _site/distfeeds.list 2>/dev/null > _site/vermagic.txt
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: _site/distfeeds.list
          archive: false
